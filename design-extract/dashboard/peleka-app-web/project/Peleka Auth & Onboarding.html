<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Peleka — Auth & Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: "Inter", system-ui, sans-serif; }
    #root { width: 100vw; height: 100vh; }
    .pa-board { width: 100%; height: 100%; overflow: hidden; position: relative; isolation: isolate; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>

  <script type="text/babel" data-presets="react">
    const ACCENT_OPTIONS = {
      "Forest (default)": ["#16a34a", "#15803d", "#166534", "#f0fdf4", "#bbf7d0"],
      "Emerald":          ["#059669", "#047857", "#065f46", "#ecfdf5", "#a7f3d0"],
      "Lime":             ["#65a30d", "#4d7c0f", "#365314", "#f7fee7", "#d9f99d"],
      "Teal":             ["#0d9488", "#0f766e", "#115e59", "#f0fdfa", "#99f6e4"],
    };

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentName": "Forest (default)",
      "fontSize": 14
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const arr = ACCENT_OPTIONS[t.accentName] || ACCENT_OPTIONS["Forest (default)"];
      const cssVars = {
        "--pk-accent": arr[0],
        "--pk-accent-hover": arr[1],
        "--pk-accent-dark": arr[2],
        "--pk-accent-soft": arr[3],
        "--pk-accent-soft-border": arr[4],
        fontSize: t.fontSize + "px",
      };

      return (
        <>
          <DesignCanvas>
            <DCSection
              id="auth"
              title="Authentication"
              subtitle="Login & signup share a split layout — green brand panel on the left, form on the right"
            >
              <DCArtboard id="login" label="A · Login" width={1280} height={840}>
                <div className="pa-board" style={cssVars}>
                  <PelekaLogin/>
                </div>
              </DCArtboard>
              <DCArtboard id="signup" label="B · Signup" width={1280} height={840}>
                <div className="pa-board" style={cssVars}>
                  <PelekaSignup/>
                </div>
              </DCArtboard>
            </DCSection>

            <DCSection
              id="onboarding"
              title="Onboarding flow"
              subtitle="3-step setup right after signup — Business · Type · Plan. Click Continue/Back inside the artboard to walk through it."
            >
              <DCArtboard id="onboarding" label="3-step setup (interactive)" width={1280} height={1040}>
                <div className="pa-board" style={cssVars}>
                  <PelekaOnboarding/>
                </div>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Brand"/>
            <TweakSelect
              label="Accent shade"
              value={t.accentName}
              options={Object.keys(ACCENT_OPTIONS)}
              onChange={(v) => setTweak("accentName", v)}
            />
            <TweakSection label="Typography"/>
            <TweakSlider
              label="Font size"
              value={t.fontSize} min={12} max={17} step={0.5} unit="px"
              onChange={(v) => setTweak("fontSize", v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
