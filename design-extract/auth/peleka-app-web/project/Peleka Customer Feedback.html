<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Peleka — Customer Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: "Inter", system-ui, sans-serif; }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="customer-feedback.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      const business = { name: "Fragrance HQ", initial: "F" };
      const PelekaCustomerFeedback = window.PelekaCustomerFeedback;

      return (
        <DesignCanvas>
          <DCSection
            id="customer"
            title="Customer Feedback Page"
            subtitle="Public mobile URL — peleka-woad.vercel.app/feedback/[id]. Sent to the customer via SMS after delivery is marked complete."
          >
            <DCArtboard id="form" label="A · Form (interactive — tap stars)" width={460} height={920}>
              <IOSDevice width={402} height={874}>
                <PelekaCustomerFeedback state="form" business={business} />
              </IOSDevice>
            </DCArtboard>
            <DCArtboard id="filled" label="B · Filled out" width={460} height={920}>
              <IOSDevice width={402} height={874}>
                <PelekaCustomerFeedback state="form" business={business} initial={{ order: 5, delivery: 4, comment: "Brian arrived right on time. Bouquet was perfect — thank you!" }} />
              </IOSDevice>
            </DCArtboard>
            <DCArtboard id="submitted" label="C · Submitted (thank you)" width={460} height={920}>
              <IOSDevice width={402} height={874}>
                <PelekaCustomerFeedback state="submitted" business={business} />
              </IOSDevice>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
